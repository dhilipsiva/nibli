[package]
name = "nibli-verify"
description = "Differential soundness gate: check nibli's verdict against Vampire (classical FOL, Horn/NAF-free) and clingo (ASP, stratified-NAF + closed-world)"
version = "0.1.0"
edition = "2024"

[dependencies]
nibli-engine = { path = "../nibli-engine" }
nibli-types = { path = "../nibli-types" }
# Direct parser access for the gerna <-> camxes parse-differential (parse-level
# acceptance, one level below nibli-engine's parse+compile front door).
gerna = { path = "../gerna" }

[[bin]]
name = "nibli-verify"
path = "src/main.rs"

[lib]
name = "nibli_verify"
path = "src/lib.rs"
