# cargo-mutants configuration — the mutation-testing baseline over the
# SOUNDNESS-CRITICAL paths (`just mutants`).
#
# Scope: the reasoning core (logji: backward chaining, rule firing/
# stratification, KB/union-find) and the semantic compiler (smuni: event
# decomposition, arg->role mapping). These are the files where a silent logic
# mutation could produce a fabricated verdict.
examine_globs = [
    "nibli-reason/src/reasoning.rs",
    "nibli-reason/src/rules.rs",
    "nibli-reason/src/kb.rs",
    "nibli-semantics/src/semantic/*.rs",
]

# Run the suites that actually pin these paths for EVERY mutant: the two
# mutated crates' own tests, nibli-engine's integration tests (full
# parse -> compile -> reason pipeline), AND nibli-kr — its shape_tests/ suite
# (migrated out of nibli-semantics 2026-07-18) is the killer for most
# nibli-semantics compile-shape mutants; omitting it silently dropped that
# kill power from this gate (2026-07-18 re-cut audit finding: 9 survivors
# whose killers lived only there). Never the whole workspace: a workspace
# `cargo test` links the cdylib component crates (WIT `@` export symbols
# break the linker), and the nibli-verify differential sweeps are far too
# slow per-mutant.
test_package = ["nibli-reason", "nibli-semantics", "nibli-engine", "nibli-kr"]

# --tests = unit + integration targets, no doctests (doctests are not part of
# the CI gate). logji's reasoning tests share global state via RefCell and
# need --test-threads=1 (same constraint the Justfile encodes).
additional_cargo_test_args = ["--tests", "--", "--test-threads=1"]

# STABILITY: a generous fixed floor + multiplier so long-but-finite mutants
# complete deterministically instead of flapping between the timeout bucket
# (counted caught) and missed across runs — observed under -j 10 load. True
# hangs still time out, stably.
minimum_test_timeout = 60
timeout_multiplier = 8.0
