[package]
name = "nibli-ui"
description = "Dioxus web UI for the Transparency Triad"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { version = "0.7.3", features = ["web"] }
gloo-net = { version = "0.6", features = ["http"] }
gloo-timers = { version = "0.3", features = ["futures"] }
nibli-protocol = { path = "../nibli-protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
smuni-dictionary = { path = "../smuni-dictionary" }
