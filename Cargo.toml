[workspace]
members = [
    "gerna",
    "smuni",
    "logji",
    "gasnu",
    "lasna",
    "nibli",
    "nibli-ui",
    "nibli-engine",
    "nibli-protocol",
    "smuni-dictionary",
    "nibli-store",
    "nibli-types",
    "nibli-import",
    "nibli-wasm",
    "nibli-render",
    "nibli-verify",
]
exclude = ["fuzz"]
resolver = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
