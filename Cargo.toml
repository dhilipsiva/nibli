[workspace]
members = [
    "gerna",
    "smuni",
    "logji",
    "gasnu",
    "lasna",
    "nibli",
    "nibli-ui",
    "nibli-engine",
    "nibli-protocol",
    "nibli-server",
    "smuni-dictionary",
    "nibli-store",
    "tavla",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
