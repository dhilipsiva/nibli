[package]
name = "tavla"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "tavla"
path = "src/main.rs"

[dependencies]
nibli-engine = { path = "../nibli-engine" }
nibli-protocol = { path = "../nibli-protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
chrono = "0.4"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive", "env"] }
async-trait = "0.1"
axum = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

[dependencies.webrtc]
version = "0.12"
optional = true

[features]
default = []
webrtc-transport = ["webrtc"]

[dev-dependencies]
