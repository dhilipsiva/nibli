name: CI

on:
  push:
  pull_request:

jobs:
  runtime-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      # lasna/src/bindings.rs is auto-generated by `cargo component build -p lasna`
      # and gitignored, so it is absent on a fresh checkout. `just build-wasm`
      # regenerates it (and `cargo fmt -p lasna` normalizes it) so the later
      # fmt-check + native `test` compile of lasna succeed; it also pre-builds the
      # WASM component the smokes need.
      - name: Generate WIT bindings (lasna)
        run: nix develop --extra-experimental-features 'nix-command flakes' --command just build-wasm

      - name: Runtime CI gates (native + WASM)
        run: nix develop --extra-experimental-features 'nix-command flakes' --command just ci-all

  # Time-boxed libFuzzer sweep (3 targets × 120 s), parallel to runtime-ci so it
  # never extends the main gate's critical path. Corpora are seeded from the
  # shipped .nibli files (+ the nibli KR acceptance corpus); any crash/OOM fails
  # the job.
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Fuzz gate (seed + 4 targets, time-boxed)
        run: nix develop --extra-experimental-features 'nix-command flakes' --command just fuzz-ci
